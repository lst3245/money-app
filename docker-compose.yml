version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: money
      POSTGRES_USER: money
      POSTGRES_PASSWORD: money
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U money"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://money:money@db:5432/money?schema=public
      JWT_SECRET: change-me
      NODE_ENV: production
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    environment:
      NEXT_PUBLIC_API_BASE: /api
      NODE_ENV: production
    depends_on:
      - api

  proxy:
    image: caddy:2
    volumes:
      - ./proxy/Caddyfile:/etc/caddy/Caddyfile
      - caddydata:/data
      - caddyconfig:/config
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
      - api

volumes:
  dbdata:
  caddydata:
  caddyconfig:
